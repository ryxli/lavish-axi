<!-- ==SECTION:timeline== use for: plans, rollouts, sequences, and ordered process steps -->
<p class="section-heading"><!-- HEADING: e.g. "Rollout Plan" --></p>
<ol class="timeline">
  <!-- Item pattern: marker dot, then title, optional meta, and a muted body. -->
  <li class="timeline-item">
    <span class="timeline-marker" aria-hidden="true"></span>
    <div class="timeline-content">
      <div class="timeline-head">
        <!-- TITLE: the phase name -->
        <span class="timeline-title">Phase 1 - Foundations</span>
        <!-- META (optional): omit this span when a phase has no date -->
        <span class="timeline-meta">Week 1</span>
      </div>
      <!-- BODY: what happens in this phase -->
      <p class="timeline-body">Lay the schema and shared primitives the later work builds on.</p>
    </div>
  </li>
  <li class="timeline-item">
    <span class="timeline-marker" aria-hidden="true"></span>
    <div class="timeline-content">
      <div class="timeline-head">
        <span class="timeline-title">Phase 2 - Build</span>
        <span class="timeline-meta">Weeks 2-3</span>
      </div>
      <p class="timeline-body">Implement the core flow against the new foundations.</p>
    </div>
  </li>
  <li class="timeline-item">
    <span class="timeline-marker" aria-hidden="true"></span>
    <div class="timeline-content">
      <div class="timeline-head">
        <span class="timeline-title">Phase 3 - Ship</span>
      </div>
      <p class="timeline-body">Roll out behind a flag, then widen once the metrics hold.</p>
    </div>
  </li>
</ol>
<!-- ==/SECTION:timeline== -->
