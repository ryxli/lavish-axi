<!-- ==SECTION:callout== use for: inline caveats, tips, and key context set apart from the prose -->
<!-- Pick one variant per callout: callout--info (blue), callout--tip (green), callout--warn (amber). -->
<div class="callout callout--info">
  <!-- ICON: a short glyph or letter; aria-hidden since the title carries the meaning -->
  <div class="callout-icon" aria-hidden="true">&#8505;</div>
  <div class="callout-body">
    <!-- TITLE: a few bold words -->
    <div class="callout-title">Worth knowing</div>
    <!-- BODY: the context, kept to a sentence or two -->
    <p class="callout-text">This dataset is refreshed nightly, so figures can lag the live system by a day.</p>
  </div>
</div>

<div class="callout callout--tip">
  <div class="callout-icon" aria-hidden="true">&#10022;</div>
  <div class="callout-body">
    <div class="callout-title">Tip</div>
    <p class="callout-text">Pin the baseline before you compare so the deltas stay meaningful.</p>
  </div>
</div>

<div class="callout callout--warn">
  <div class="callout-icon" aria-hidden="true">&#9888;</div>
  <div class="callout-body">
    <div class="callout-title">Heads up</div>
    <p class="callout-text">Migrating without a backup is irreversible. Snapshot the store first.</p>
  </div>
</div>
<!-- ==/SECTION:callout== -->
