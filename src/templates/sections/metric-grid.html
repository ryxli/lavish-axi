<!-- ==SECTION:metric-grid== use for: dashboards, KPIs, before/after counts, and signal-dense report headers -->
<section class="section">
  <p class="section-heading"><!-- HEADING: e.g. Current signal --></p>
  <div class="metric-grid">
    <div class="metric-tile">
      <div class="metric-value">248</div>
      <div class="metric-label">Tests passing</div>
      <div class="metric-delta metric-delta--good">+12 since last run</div>
    </div>
    <div class="metric-tile">
      <div class="metric-value">3</div>
      <div class="metric-label">Open regressions</div>
      <div class="metric-delta metric-delta--warn">2 still need triage</div>
    </div>
    <div class="metric-tile is-key">
      <div class="metric-value">94%</div>
      <div class="metric-label">Coverage</div>
      <!-- omit metric-delta when there is no change to call out -->
    </div>
  </div>
</section>
<!-- ==/SECTION:metric-grid== -->
