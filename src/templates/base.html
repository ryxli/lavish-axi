<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><!-- TITLE: replace me --></title>
    <style>
      /* Canonical Lavish brand foundation - inlined from colors_and_type.css so every template renders standalone. */
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Geist:wght@400;500;600;700;750&family=Geist+Mono:wght@400;500;600&display=swap');

:root {
  --ink-900: #0f1115;
  --ink-800: #11141a;
  --ink-700: #171a21;
  --ink-600: #1c212b;
  --steel-700: #2a2f3a;
  --steel-600: #303745;
  --steel-500: #3c4557;
  --steel-400: #8c96aa;
  --steel-300: #aeb6c6;
  --steel-200: #b9c0cf;
  --steel-100: #d8deea;
  --cream-50: #fffbf3;
  --cream-100: #f7f3ea;
  --cream-200: #e8e1cf;
  --brass-500: #f4c95d;
  --brass-400: #ffd877;
  --brass-ink: #17130a;
  --sage-900: #172419;
  --sage-700: #315f3a;
  --sage-300: #8fe39e;
  --amber-900: #25230f;
  --amber-700: #5d4d1b;
  --rust-500: #f06464;
  --bg: var(--ink-900);
  --bg-panel: var(--ink-800);
  --bg-bar: var(--ink-700);
  --bg-elevated: var(--ink-600);
  --fg: var(--cream-100);
  --fg-muted: var(--steel-100);
  --fg-dim: var(--steel-200);
  --fg-faint: var(--steel-300);
  --fg-label: var(--steel-400);
  --border: var(--steel-600);
  --border-subtle: var(--steel-700);
  --border-strong: var(--steel-500);
  --accent: var(--brass-500);
  --accent-hover: var(--brass-400);
  --accent-ink: var(--brass-ink);
  --danger: var(--rust-500);
  --font-serif: 'EB Garamond', 'Iowan Old Style', 'Georgia', serif;
  --font-sans: 'Geist', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --text-xs: 12px;
  --lh-xs: 1.35;
  --text-sm: 13px;
  --lh-sm: 1.4;
  --text-base: 14px;
  --lh-base: 1.45;
  --text-md: 16px;
  --lh-md: 1.5;
  --text-lg: 18px;
  --lh-lg: 1.45;
  --text-xl: 22px;
  --lh-xl: 1.3;
  --text-2xl: 28px;
  --lh-2xl: 1.25;
  --text-3xl: 36px;
  --lh-3xl: 1.18;
  --text-4xl: 48px;
  --lh-4xl: 1.1;
  --text-5xl: 64px;
  --lh-5xl: 1.05;
  --text-display: 92px;
  --lh-display: 1;
  --w-regular: 400;
  --w-medium: 500;
  --w-semi: 600;
  --w-bold: 700;
  --w-brand: 750;
  --track-tight: -0.01em;
  --track-normal: 0;
  --track-brand: 0.02em;
  --track-label: 0.08em;
  --track-caps: 0.12em;
  --space-1: 2px;
  --space-2: 4px;
  --space-3: 6px;
  --space-4: 8px;
  --space-5: 10px;
  --space-6: 12px;
  --space-8: 16px;
  --space-10: 20px;
  --space-12: 24px;
  --space-16: 32px;
  --space-20: 40px;
  --space-24: 48px;
  --space-32: 64px;
  --radius-sm: 8px;
  --radius-md: 10px;
  --radius-lg: 12px;
  --radius-xl: 14px;
  --radius-pill: 999px;
  --hairline: 1px solid var(--border);
  --hairline-subtle: 1px solid var(--border-subtle);
  --shadow-tooltip: 0 16px 44px rgba(0, 0, 0, 0.35);
  --shadow-floating: 0 20px 70px rgba(0, 0, 0, 0.35);
  --ease: cubic-bezier(0.2, 0.6, 0.2, 1);
  --dur-fast: 120ms;
  --dur: 180ms;
  --dur-slow: 320ms;
}

*, *::before, *::after {
  box-sizing: border-box;
  min-width: 0;
}

html {
  -webkit-text-size-adjust: 100%;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--lh-base);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body, input, textarea, select, button {
  font: inherit;
}

a {
  color: var(--accent);
  text-decoration: none;
}

a:hover {
  color: var(--accent-hover);
}

button, input, textarea, select {
  color: inherit;
}

img, svg {
  display: block;
  max-width: 100%;
}

::selection {
  background: rgba(244, 201, 93, 0.28);
  color: var(--fg);
}

.mono {
  font-family: var(--font-mono);
}

.serif {
  font-family: var(--font-serif);
}

.eyebrow {
  font-family: var(--font-sans);
  font-size: 10px;
  font-weight: var(--w-bold);
  letter-spacing: var(--track-label);
  text-transform: uppercase;
  color: var(--fg-label);
}

.rule {
  border: 0;
  border-top: var(--hairline);
  margin: var(--space-24) 0;
}


      .page {
        max-width: 920px;
        margin: 0 auto;
        padding: 52px 24px 88px;
      }

      .section {
        margin-top: var(--space-20);
      }

      .hero {
        margin-bottom: var(--space-24);
        padding-bottom: var(--space-16);
        border-bottom: var(--hairline);
      }

      .hero-top {
        display: flex;
        align-items: center;
        gap: var(--space-6);
        margin-bottom: var(--space-8);
      }

      .hero-tick {
        width: 22px;
        height: 1px;
        background: var(--accent);
        display: inline-block;
      }

      .hero-shell {
        display: grid;
        grid-template-columns: minmax(0, 2.1fr) minmax(220px, 1fr);
        gap: var(--space-16);
        align-items: start;
      }

      .hero-title {
        margin: 0 0 var(--space-6);
        font-family: var(--font-serif);
        font-size: var(--text-4xl);
        line-height: var(--lh-4xl);
        letter-spacing: var(--track-tight);
        font-weight: var(--w-regular);
        color: var(--fg);
      }

      .hero-subtitle {
        margin: 0;
        max-width: 60ch;
        font-family: var(--font-serif);
        font-size: var(--text-lg);
        line-height: var(--lh-md);
        font-style: italic;
        color: var(--fg-muted);
      }

      .hero-meta {
        border: var(--hairline);
        border-radius: var(--radius-lg);
        background: var(--bg-panel);
        padding: var(--space-10) var(--space-12);
        display: grid;
        gap: var(--space-4);
      }

      .hero-meta-line {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        line-height: var(--lh-xs);
        color: var(--fg-faint);
      }

      body[data-treatment="operations-desk"] .hero-title {
        font-family: var(--font-sans);
        font-size: var(--text-3xl);
        line-height: var(--lh-3xl);
        font-weight: var(--w-semi);
      }

      body[data-treatment="operations-desk"] .hero-subtitle {
        font-family: var(--font-sans);
        font-size: var(--text-md);
        font-style: normal;
      }

      body[data-treatment="operations-desk"] .hero-meta {
        background: var(--bg-elevated);
      }

      body[data-treatment="causal-diagram"] .hero-shell {
        grid-template-columns: minmax(0, 1.7fr) minmax(220px, 1fr);
      }

      body[data-treatment="causal-diagram"] .hero-meta {
        border-top: 0;
        border-right: 0;
        border-bottom: 0;
        border-left: 2px solid var(--accent);
        border-radius: 0;
        padding: 0 0 0 var(--space-12);
        background: transparent;
      }

      .section-heading {
        margin: 0 0 var(--space-10);
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: var(--track-caps);
        text-transform: uppercase;
        color: var(--fg-faint);
      }

      .verdict {
        border: var(--hairline);
        border-left: 2px solid var(--accent);
        border-radius: var(--radius-xl);
        background: var(--bg-panel);
        padding: var(--space-12) var(--space-16);
        margin-bottom: var(--space-16);
      }

      .verdict-title {
        margin: 0 0 var(--space-3);
        font-family: var(--font-serif);
        font-size: var(--text-xl);
        line-height: var(--lh-xl);
        color: var(--fg);
      }

      .verdict-body {
        margin: 0;
        color: var(--fg-muted);
      }

      body[data-treatment="operations-desk"] .verdict-title {
        font-family: var(--font-sans);
        font-size: var(--text-lg);
        line-height: var(--lh-lg);
        font-weight: var(--w-semi);
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(180px, 100%), 1fr));
        gap: var(--space-8);
        margin-bottom: var(--space-20);
      }

      .metric-tile {
        border: var(--hairline);
        border-radius: var(--radius-lg);
        background: var(--bg-panel);
        padding: var(--space-12);
      }

      .metric-value {
        margin: 0;
        font-family: var(--font-serif);
        font-size: var(--text-2xl);
        line-height: 1.1;
        color: var(--fg);
      }

      .metric-label {
        margin-top: var(--space-3);
        font-size: var(--text-xs);
        color: var(--fg-faint);
        letter-spacing: var(--track-label);
        text-transform: uppercase;
      }

      .metric-delta {
        margin-top: var(--space-4);
        font-size: var(--text-xs);
        color: var(--fg-dim);
      }

      .metric-delta--good,
      .metric-tile.is-key .metric-value {
        color: var(--accent);
      }

      .metric-delta--warn {
        color: var(--fg-muted);
      }

      body[data-treatment="operations-desk"] .metric-grid {
        gap: 1px;
        border: var(--hairline);
        border-radius: var(--radius-lg);
        background: var(--border);
        overflow: hidden;
      }

      body[data-treatment="operations-desk"] .metric-tile {
        border: 0;
        border-radius: 0;
        background: var(--bg-elevated);
      }

      body[data-treatment="operations-desk"] .metric-value {
        font-family: var(--font-mono);
      }

      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(250px, 100%), 1fr));
        gap: var(--space-8);
      }

      .card {
        border: var(--hairline);
        border-radius: var(--radius-lg);
        background: var(--bg-panel);
        padding: var(--space-12) var(--space-12) var(--space-10);
      }

      .card-kicker {
        margin-bottom: var(--space-4);
      }

      .card-title {
        margin: 0 0 var(--space-3);
        font-family: var(--font-sans);
        font-size: var(--text-md);
        line-height: var(--lh-md);
        font-weight: var(--w-semi);
        color: var(--fg);
      }

      .card-body {
        margin: 0;
        color: var(--fg-dim);
      }

      body[data-treatment="reading-room"] .card-title,
      body[data-treatment="reading-room"] .timeline-body,
      body[data-treatment="reading-room"] .callout-text,
      body[data-treatment="reading-room"] .form-hint,
      body[data-treatment="reading-room"] .option-desc,
      body[data-treatment="reading-room"] td {
        font-family: var(--font-serif);
      }

      .callout {
        border: var(--hairline);
        border-left: 2px solid var(--accent);
        border-radius: var(--radius-lg);
        background: var(--bg-panel);
        padding: var(--space-10) var(--space-12);
      }

      .callout-title {
        margin: 0 0 var(--space-3);
        font-family: var(--font-sans);
        font-size: var(--text-sm);
        font-weight: var(--w-semi);
        color: var(--fg);
      }

      .callout-text {
        margin: 0;
        color: var(--fg-dim);
      }

      .table-wrap {
        overflow-x: auto;
        border: var(--hairline);
        border-radius: var(--radius-lg);
        background: var(--bg-panel);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: var(--space-6) var(--space-8);
        border-bottom: var(--hairline-subtle);
        text-align: left;
        vertical-align: top;
      }

      th {
        font-family: var(--font-mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: var(--track-label);
        color: var(--fg-faint);
        font-weight: var(--w-semi);
      }

      td {
        font-size: var(--text-sm);
        color: var(--fg-dim);
      }

      td:first-child,
      .td-label {
        color: var(--fg);
      }

      td.num {
        font-family: var(--font-mono);
        text-align: right;
        white-space: nowrap;
      }

      .td-best,
      .td-accent {
        color: var(--accent);
      }

      .td-risk {
        color: var(--danger);
      }

      body[data-treatment="reading-room"] th {
        font-family: var(--font-serif);
        font-size: var(--text-sm);
        letter-spacing: 0;
        text-transform: none;
        font-style: italic;
        font-weight: var(--w-regular);
      }

      .timeline {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: var(--space-8);
      }

      .timeline-item {
        position: relative;
        padding-left: var(--space-16);
      }

      .timeline-item::before {
        content: "";
        position: absolute;
        left: 5px;
        top: 5px;
        bottom: -13px;
        width: 1px;
        background: var(--border);
      }

      .timeline-item:last-child::before {
        display: none;
      }

      .timeline-item::after {
        content: "";
        position: absolute;
        left: 0;
        top: 5px;
        width: 12px;
        height: 12px;
        border-radius: var(--radius-pill);
        border: 2px solid var(--accent);
        background: var(--bg);
      }

      .timeline-node {
        border: var(--hairline);
        border-radius: var(--radius-lg);
        background: var(--bg-panel);
        padding: var(--space-10) var(--space-12);
      }

      .timeline-step {
        margin-bottom: var(--space-3);
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: var(--track-label);
        text-transform: uppercase;
        color: var(--fg-faint);
      }

      .timeline-head {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: var(--space-4) var(--space-8);
        margin-bottom: var(--space-3);
      }

      .timeline-title {
        color: var(--fg);
        font-family: var(--font-sans);
        font-size: var(--text-md);
        font-weight: var(--w-semi);
      }

      .timeline-meta {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: var(--track-label);
        text-transform: uppercase;
        color: var(--fg-faint);
      }

      .timeline-body {
        margin: 0;
        color: var(--fg-dim);
      }

      body[data-treatment="causal-diagram"] .timeline {
        grid-auto-flow: column;
        grid-auto-columns: minmax(220px, 1fr);
        overflow-x: auto;
        padding-bottom: var(--space-4);
      }

      body[data-treatment="causal-diagram"] .timeline-item {
        padding-left: 0;
        padding-right: var(--space-10);
      }

      body[data-treatment="causal-diagram"] .timeline-item::before,
      body[data-treatment="causal-diagram"] .timeline-item::after {
        display: none;
      }

      body[data-treatment="causal-diagram"] .timeline-item:not(:last-child) .timeline-node {
        position: relative;
      }

      body[data-treatment="causal-diagram"] .timeline-item:not(:last-child) .timeline-node::after {
        content: "";
        position: absolute;
        top: 50%;
        right: calc(var(--space-10) * -1);
        width: var(--space-10);
        border-top: 1px solid var(--accent);
      }

      body[data-treatment="causal-diagram"] .timeline-item:not(:last-child) .timeline-node::before {
        content: "";
        position: absolute;
        top: calc(50% - 4px);
        right: calc(var(--space-1) * -1);
        border-top: 4px solid transparent;
        border-bottom: 4px solid transparent;
        border-left: 6px solid var(--accent);
      }

      .code-block {
        border: var(--hairline);
        border-radius: var(--radius-lg);
        background: var(--bg-elevated);
        padding: var(--space-12);
        overflow-x: auto;
      }

      .code-block-label {
        margin-bottom: var(--space-6);
        font-family: var(--font-mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: var(--track-label);
        color: var(--fg-faint);
      }

      .code-block pre {
        margin: 0;
        font-family: var(--font-mono);
        font-size: var(--text-sm);
        line-height: var(--lh-md);
        color: var(--cream-200);
      }

      .form-card {
        border: var(--hairline);
        border-radius: var(--radius-xl);
        background: var(--bg-panel);
        padding: var(--space-16);
      }

      .form-question {
        display: block;
        margin-bottom: var(--space-3);
        font-family: var(--font-serif);
        font-size: var(--text-2xl);
        line-height: var(--lh-2xl);
        letter-spacing: var(--track-tight);
        color: var(--fg);
      }

      body[data-treatment="operations-desk"] .form-question {
        font-family: var(--font-sans);
        font-size: var(--text-lg);
        line-height: var(--lh-lg);
        font-weight: var(--w-semi);
        letter-spacing: var(--track-normal);
      }

      .form-hint {
        margin: 0 0 var(--space-12);
        color: var(--fg-muted);
      }

      .radio-option {
        display: flex;
        align-items: flex-start;
        gap: var(--space-10);
        margin-bottom: var(--space-6);
        padding: var(--space-8) var(--space-10);
        border: var(--hairline);
        border-radius: var(--radius-md);
        background: transparent;
        cursor: pointer;
        transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
      }

      .radio-option:hover {
        background: var(--bg-elevated);
        border-color: var(--accent);
      }

      .radio-option:has(input:checked) {
        border-color: var(--accent);
        background: rgba(244, 201, 93, 0.08);
      }

      .radio-option input[type="radio"] {
        width: 15px;
        height: 15px;
        margin-top: 3px;
        accent-color: var(--accent);
        flex: 0 0 auto;
      }
      .option-title-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: var(--space-4);
      }

      .option-title {
        display: block;
        font-family: var(--font-sans);
        font-size: var(--text-base);
        font-weight: var(--w-medium);
        color: var(--fg);
      }

      .option-desc {
        display: block;
        margin-top: var(--space-1);
        font-size: var(--text-sm);
        color: var(--fg-faint);
      }

      .rec-tag {
        display: inline-block;
        margin-left: var(--space-4);
        padding: 1px 7px;
        border-radius: var(--radius-pill);
        background: var(--accent);
        color: var(--accent-ink);
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: var(--w-semi);
        letter-spacing: 0.04em;
        vertical-align: 1px;
      }

      .submit-row {
        display: flex;
        align-items: center;
        gap: var(--space-12);
        flex-wrap: wrap;
        margin-top: var(--space-8);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-3);
        padding: 10px 18px;
        border: 1px solid transparent;
        border-radius: var(--radius-md);
        background: transparent;
        color: var(--fg);
        cursor: pointer;
        transition: background var(--dur) var(--ease), opacity var(--dur-fast) var(--ease), border-color var(--dur) var(--ease);
      }

      .btn:hover:not(:disabled) {
        opacity: 0.96;
      }

      .btn:active:not(:disabled) {
        opacity: 0.85;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn:focus-visible,
      .radio-option:focus-within {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .btn-primary {
        background: var(--accent);
        color: var(--accent-ink);
        border-color: var(--accent);
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }

      .btn-ghost {
        background: transparent;
        border-color: var(--border);
        color: var(--fg-muted);
      }

      .btn-sm {
        padding: var(--space-4) var(--space-8);
        font-size: var(--text-xs);
      }

      .actions-row {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-8);
        justify-content: center;
        align-items: center;
      }

      .status {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--sage-300);
      }

      .status:empty,
      .sent-msg:empty {
        display: none;
      }

      .sent-msg {
        margin: 0;
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        color: var(--sage-300);
      }

      .chat-fallback {
        margin-top: var(--space-10);
        font-size: var(--text-sm);
        color: var(--fg-faint);
        font-style: italic;
        font-family: var(--font-serif);
      }

      @media (max-width: 720px) {
        .page {
          padding: 40px 18px 72px;
        }

        .hero-shell {
          grid-template-columns: 1fr;
        }

        body[data-treatment="causal-diagram"] .timeline {
          grid-auto-flow: row;
          grid-auto-columns: auto;
          overflow: visible;
        }

        body[data-treatment="causal-diagram"] .timeline-item {
          padding-right: 0;
        }

        body[data-treatment="causal-diagram"] .timeline-item .timeline-node::after,
        body[data-treatment="causal-diagram"] .timeline-item .timeline-node::before {
          display: none;
        }
      }
    </style>
  </head>
  <body data-template="__LAVISH_TEMPLATE__" data-treatment="__LAVISH_TREATMENT__">
    <div class="page">
      <!-- ==LAVISH:SECTIONS== -->
    </div>

    <script>
      function submitDecision() {
        const selected = document.querySelector('input[name="decision"]:checked');
        const sent = document.getElementById("sent-msg");
        if (!selected) {
          if (sent) sent.textContent = "Choose one option before queueing.";
          return;
        }
        const label = selected.closest(".radio-option").querySelector(".option-title").textContent.trim();
        const prompt = `Decision: ${label} (value: ${selected.value})`;

        if (window.lavish) {
          document.getElementById("submit-decision").disabled = true;
          if (sent) sent.textContent = "Queued for the agent.";
          window.lavish.queuePrompt(prompt);
          window.lavish.sendQueuedPrompts();
        } else if (sent) {
          sent.textContent = "Open this file with lavish-axi to queue feedback.";
        }
      }
    </script>
  </body>
</html>
